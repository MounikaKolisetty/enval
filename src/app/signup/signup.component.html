<app-navbar></app-navbar>
<div class="contact-bg">
    <h1>Sign Up</h1>
        <ul>
            <li>
                <a routerLink="/home" routerLinkActive="active" ariaCurrentWhenActive="page" 
                class="read-more-btn">Home</a>
            </li>
            <li>Sign Up</li>
        </ul>
</div>
<div class="signup-form">
    <form class="signup-inner" (ngSubmit)="signUp()">
        <div class="single-input-inner">
            <input type="text" placeholder="Full Name" [(ngModel)]="user.fullName" name="fullName" required>
        </div>
        <div class="single-input-inner">
            <input type="text" placeholder="Email" [(ngModel)]="user.email" name="email" required>
        </div>
        <div class="single-input-inner">
            <input [type]="passwordFieldType" placeholder="Password" [(ngModel)]="user.password" name="password" required>
            <i class="fas" [class.fa-eye]="passwordFieldType === 'password'" [class.fa-eye-slash]="passwordFieldType === 'text'" (click)="togglePasswordVisibility()"></i>
        </div>
        <button class="btn">Sign Up</button>
        <div class="login">
        <div>Already have an account?</div>
        <a routerLink="/login" routerLinkActive="active" ariaCurrentWhenActive="page" 
        class="login-page">Login</a>
        </div>
    </form>

</div>

<app-footer></app-footer>
